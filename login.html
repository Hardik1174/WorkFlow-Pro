<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WorkFlow Pro</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f0fdfa;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            color:#0f766e;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ddd;
            border-radius:10px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#14b8a6;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#0f766e;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <h2>WorkFlow Pro Login</h2>

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="login()">
            Login
        </button>

    </div>

    <script>

        function login(){

            const username =
            document.getElementById("username").value;

            const password =
            document.getElementById("password").value;

            if(
                username === "admin" &&
                password === "admin123"
            ){

                sessionStorage.setItem(
                    "loggedIn",
                    "true"
                );

                window.location.href =
                "index.html";

            }else{

                alert(
                    "Invalid Username or Password"
                );

            }

        }

    </script>

</body>
</html>
